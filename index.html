  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e-columns\"]{grid-template-columns:1fr !important}\n    [style*=\"repeat(4,1fr)\"]{grid-template-columns:repeat(2,1fr) !important}\n    [style*=\"repeat(3,1fr)\"]{grid-template-columns:1fr !important}\n    [style*=\"90px 1fr 200px\"]{grid-template-columns:56px 1fr auto !important}\n    [style*=\"columns:3\"]{columns:1 !important}\n  }\n  @media (min-width:761px){ .dz-hamburger{display:none !important} }\n  @media (max-width:760px){\n    .dz-nav{position:absolute !important;top:100%;left:0;right:0;background:#fff;flex-direction:column !important;align-items:stretch !important;gap:2px !important;padding:12px 24px 22px !important;border-bottom:1px solid #e6ebf3;box-shadow:0 14px 28px rgba(10,28,64,.1)}\n    .dz-nav.closed{display:none !important}\n    .dz-nav span{font-size:16px !important;padding:12px 2px !important;border-bottom:1px solid #f0f3f8 !important}\n    .dz-nav button{margin-top:10px !important;justify-content:center !important;font-size:16px !important;padding:14px !important}\n  }\n  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}\n  ::selection{background:#d5121f;color:#fff}\n  .reveal{opacity:0;transform:translateY(22px);transition:opacity .6s cubic-bezier(.22,.61,.36,1),transform .6s cubic-bezier(.22,.61,.36,1)}\n  .reveal.in{opacity:1;transform:none}\n  button{transition:transform .18s ease,box-shadow .18s ease,background .18s ease}\n  button:hover{transform:translateY(-2px)}\n  button:active{transform:translateY(0)}\n  @media (prefers-reduced-motion:reduce){.reveal{opacity:1 !important;transform:none !important;transition:none}button{transition:none}button:hover{transform:none}}\n  @keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}\n  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}\n  .h-anim{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.22,.61,.36,1),transform .7s cubic-bezier(.22,.61,.36,1)}\n  .h-img{transform:scale(1.05)}\n  .h-anim.in{opacity:1;transform:none}\n  .h-badge{transition-delay:.05s}\n  .h-title{transition-delay:.18s}\n  .h-text{transition-delay:.34s}\n  .h-cta{transition-delay:.5s}\n  .h-img{transition-delay:.28s}\n  .h-float{transition-delay:.7s}\n  .h-float.in{animation:floaty 4.5s 1.2s ease-in-out infinite}\n  .h-glow{animation:glowPulse 6s ease-in-out infinite}\n  @media (prefers-reduced-motion:reduce){.h-anim{opacity:1 !important;transform:none !important;transition:none}.h-float.in,.h-glow{animation:none !important}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"font-family:'Libre Franklin',system-ui,sans-serif;color:#16292f;background:#ffffff;min-height:100vh;overflow-x:hidden\">\n\n  <header style=\"position:sticky;top:0;z-index:60;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid #e6ebf3\">\n    <div style=\"position:relative;max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px\">\n      <div sc-camel-on-click=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:12px;cursor:pointer\">\n        <img src=\"5020c2e9-f48e-4dcf-a852-0aad01982d8b\" alt=\"Auto škola Dule\" style=\"height:54px;width:auto;display:block\">\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ toggleNav }}\" class=\"dz-hamburger\" aria-label=\"Meni\" style=\"background:none;border:none;cursor:pointer;font-size:28px;color:#12262d;line-height:1;padding:6px\">{{ hamburgerIcon }}<\u002Fbutton>\n      <nav class=\"{{ navClass }}\" style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:flex-end\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"8\">\n          <span sc-camel-on-click=\"{{ item.onClick }}\" style=\"{{ item.linkStyle }}\">{{ item.label }}<\u002Fspan>\n        <\u002Fsc-for>\n        <button sc-camel-on-click=\"{{ goUpis }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:14px;padding:11px 20px;border-radius:8px;border:none;cursor:pointer;box-shadow:0 6px 18px rgba(213,18,31,.28)\">{{ ctaLabel }} →<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main>\n\n    <!-- ====================== POČETNA ====================== -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <!-- HERO -->\n      <section style=\"position:relative;background:linear-gradient(160deg,#12262d 0%,#0a4f74 60%,#0093c8 100%);color:#fff;overflow:hidden\">\n        <div class=\"h-glow\" style=\"position:absolute;top:-120px;right:-120px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(213,18,31,.18),transparent 70%)\"><\u002Fdiv>\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,8vw,110px) 24px;display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;position:relative\">\n          <div style=\"min-width:280px\">\n            <div class=\"h-anim h-badge\" style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);padding:7px 14px;border-radius:100px;font-size:13px;font-weight:600;letter-spacing:.02em;color:#cdd8ec;margin-bottom:24px\">★ Preko 80% kandidata dolazi na preporuku<\u002Fdiv>\n            <h1 class=\"h-anim h-title\" style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(38px,5.4vw,68px);line-height:1.02;letter-spacing:-.025em;margin:0 0 22px\">Nauči da voziš<br>sa <span style=\"color:#d5121f\">sigurnošću.<\u002Fspan><\u002Fh1>\n            <p class=\"h-anim h-text\" style=\"font-size:clamp(16px,1.5vw,19px);line-height:1.6;color:#cdd8ec;max-width:520px;margin:0 0 34px\">Bezbedna i moderna vozila, iskusni instruktori i konstantna podrška. Kod nas biraš instruktora, vozilo i termine obuke, od A do CE kategorije.<\u002Fp>\n            <div class=\"h-anim h-cta\" style=\"display:flex;gap:14px;flex-wrap:wrap\">\n              <button sc-camel-on-click=\"{{ goUpis }}\" style=\"display:inline-flex;align-items:center;gap:9px;background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:17px;padding:16px 30px;border-radius:9px;border:none;cursor:pointer;box-shadow:0 10px 26px rgba(213,18,31,.3)\">{{ ctaLabel }} →<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ goCenovnik }}\" style=\"display:inline-flex;align-items:center;gap:9px;background:transparent;color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;padding:16px 28px;border-radius:9px;border:1.5px solid rgba(255,255,255,.32);cursor:pointer\">Pogledaj cenovnik<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"min-width:260px;position:relative\">\n            <div class=\"h-anim h-img\" style=\"border-radius:18px;overflow:hidden;height:clamp(300px,34vw,440px);box-shadow:0 30px 70px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12)\">\n              <image-slot id=\"hero-main\" shape=\"rect\" src=\"https://autoskoladule.rs/wp-content/uploads/2023/10/IMG_9487-01-1024x683.jpeg\" placeholder=\"Foto, obuka vožnje / instruktor sa kandidatom\" style=\"width:100%;height:100%\"><\u002Fimage-slot>\n            <\u002Fdiv>\n            <div class=\"h-anim h-float\" style=\"position:absolute;bottom:-22px;left:-22px;background:#fff;color:#16292f;border-radius:14px;padding:16px 20px;box-shadow:0 18px 40px rgba(10,28,64,.22);display:flex;align-items:center;gap:14px\">\n              <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:32px;color:#007bb0\">2<\u002Fdiv>\n              <div style=\"font-size:13px;line-height:1.3;color:#41506b;font-weight:600\">lokacije<br>Kruševac &amp; Varvarin<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- STATS BAR -->\n      <section style=\"background:#16292f;color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(4,1fr)\">\n          <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"padding:32px 18px;text-align:center;border-right:1px solid rgba(255,255,255,.08)\">\n              <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(30px,3.4vw,44px);color:#d5121f;line-height:1\">{{ s.n }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#aeb9cf;margin-top:8px;line-height:1.4\">{{ s.l }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- KATEGORIJE PREVIEW -->\n      <section style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,7vw,96px) 24px\">\n        <div style=\"text-align:center;max-width:640px;margin:0 auto 48px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:12px\">Kategorije obuke<\u002Fdiv>\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.6vw,42px);letter-spacing:-.02em;margin:0 0 14px\">Za svaku dozvolu koja ti treba<\u002Fh2>\n          <p style=\"font-size:17px;color:#5a6a85;line-height:1.6;margin:0\">Od mopeda i motocikala, preko putničkih automobila, do teretnih vozila sa prikolicom.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n          <sc-for list=\"{{ catCards }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div sc-camel-on-click=\"{{ goKategorije }}\" style=\"border:1px solid #e6ebf3;border-radius:16px;padding:34px 30px;cursor:pointer;transition:all .2s;background:#fff\" style-hover=\"border:1px solid #007bb0;box-shadow:0 18px 44px rgba(10,28,64,.1);transform:translateY(-4px)\">\n              <div style=\"width:64px;height:64px;border-radius:14px;background:#f3f6fb;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:900;font-size:30px;color:#007bb0;margin-bottom:22px\">{{ c.letter }}<\u002Fdiv>\n              <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;margin:0 0 10px\">{{ c.title }}<\u002Fh3>\n              <p style=\"font-size:15px;color:#5a6a85;line-height:1.6;margin:0 0 18px\">{{ c.desc }}<\u002Fp>\n              <span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;color:#007bb0\">Saznaj više →<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ONLINE / PREDAVANJA / KONDICIONI -->\n      <section style=\"background:#f3f6fb\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,7vw,96px) 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n          <div style=\"background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e6ebf3;display:flex;flex-direction:column\">\n            <div style=\"height:180px\"><image-slot id=\"h-upis\" shape=\"rect\" src=\"https://autoskoladule.rs/wp-content/uploads/2023/01/Ova-slika-neka-stoji-isto-za-nesto-1024x683.jpg\" placeholder=\"Foto, online upis\" style=\"width:100%;height:100%\"><\u002Fimage-slot><\u002Fdiv>\n            <div style=\"padding:26px 26px 30px;flex:1;display:flex;flex-direction:column\">\n              <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin:0 0 10px\">Online upis<\u002Fh3>\n              <p style=\"font-size:15px;color:#5a6a85;line-height:1.6;margin:0 0 20px;flex:1\">Upiši se brzo i lako, popuni podatke jednim klikom, mi te kontaktiramo.<\u002Fp>\n              <button sc-camel-on-click=\"{{ goUpis }}\" style=\"align-self:flex-start;background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:14px;padding:11px 20px;border-radius:8px;border:none;cursor:pointer\">Upiši se →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e6ebf3;display:flex;flex-direction:column\">\n            <div style=\"height:180px\"><image-slot id=\"h-pred\" shape=\"rect\" src=\"https://autoskoladule.rs/wp-content/uploads/2023/01/IMG_1848-1024x683.jpg\" placeholder=\"Foto, online predavanja\" style=\"width:100%;height:100%\"><\u002Fimage-slot><\u002Fdiv>\n            <div style=\"padding:26px 26px 30px;flex:1;display:flex;flex-direction:column\">\n              <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin:0 0 10px\">Online predavanja<\u002Fh3>\n              <p style=\"font-size:15px;color:#5a6a85;line-height:1.6;margin:0 0 20px;flex:1\">Sva predavanja možeš odslušati i odgledati od kuće, koliko god puta ti treba.<\u002Fp>\n              <button sc-camel-on-click=\"{{ goVideo }}\" style=\"align-self:flex-start;background:#16292f;color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;padding:11px 20px;border-radius:8px;border:none;cursor:pointer\">Video lekcije →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e6ebf3;display:flex;flex-direction:column\">\n            <div style=\"height:180px\"><image-slot id=\"h-kond\" shape=\"rect\" src=\"https://autoskoladule.rs/wp-content/uploads/2023/01/Slika-za-kondicione-casove-1024x683.jpg\" placeholder=\"Foto, kondicioni časovi\" style=\"width:100%;height:100%\"><\u002Fimage-slot><\u002Fdiv>\n            <div style=\"padding:26px 26px 30px;flex:1;display:flex;flex-direction:column\">\n              <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin:0 0 10px\">Kondicioni časovi<\u002Fh3>\n              <p style=\"font-size:15px;color:#5a6a85;line-height:1.6;margin:0 0 20px;flex:1\">Imaš dozvolu a ne voziš? Naš tim će ti pomoći da ponovo sedneš za volan.<\u002Fp>\n              <button sc-camel-on-click=\"{{ goKondicioni }}\" style=\"align-self:flex-start;background:#16292f;color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;padding:11px 20px;border-radius:8px;border:none;cursor:pointer\">Pročitaj više →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- PROMO AKCIJA -->\n      <sc-if value=\"{{ promoActive }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"max-width:1200px;margin:0 auto;padding:clamp(40px,5vw,64px) 24px\">\n        <div style=\"background:linear-gradient(120deg,#0a4f74,#12262d);border-radius:20px;padding:clamp(32px,5vw,54px);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;position:relative;overflow:hidden\">\n          <div style=\"position:absolute;top:-80px;right:60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(213,18,31,.2),transparent 70%)\"><\u002Fdiv>\n          <div style=\"position:relative;min-width:260px\">\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;color:#d5121f;margin-bottom:12px\">AKCIJA, NOVE GRUPE<\u002Fdiv>\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(26px,3.4vw,40px);letter-spacing:-.02em;margin:0 0 10px;line-height:1.05\">Otvorene nove grupe<\u002Fh2>\n            <p style=\"font-size:17px;color:#cdd8ec;margin:0;max-width:440px\">Zauzmi svoje mesto na vreme, popuni podatke i mi te zovemo.<\u002Fp>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ goUpis }}\" style=\"position:relative;background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;padding:18px 36px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap;box-shadow:0 12px 30px rgba(213,18,31,.32)\">Prijavi se odmah →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ZAŠTO MI -->\n      <section style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,88px) 24px;display:grid;grid-template-columns:.95fr 1.05fr;gap:56px;align-items:center\">\n        <div style=\"border-radius:18px;overflow:hidden;height:clamp(280px,32vw,420px);box-shadow:0 24px 60px rgba(10,28,64,.14)\">\n          <image-slot id=\"why-img\" shape=\"rect\" src=\"https://autoskoladule.rs/wp-content/uploads/2023/07/IMG_5180-1-1024x683.jpg\" placeholder=\"Foto, tim / obuka\" style=\"width:100%;height:100%\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"min-width:280px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:12px\">Zašto baš mi?<\u002Fdiv>\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(26px,3.4vw,40px);letter-spacing:-.02em;margin:0 0 18px;line-height:1.08\">Cilj nam je da položiš i da budeš dobar vozač<\u002Fh2>\n          <p style=\"font-size:16px;color:#5a6a85;line-height:1.7;margin:0 0 26px\">Trudimo se da svaki kandidat položi iz prvog puta. Instruktori te savetuju kako da savladaš tremu pre ispita i na koje segmente vožnje da posebno obratiš pažnju. Po uspešnosti smo u vrhu auto škola u Rasinskom okrugu.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px 24px\">\n            <sc-for list=\"{{ why }}\" as=\"w\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:flex-start;gap:10px;font-size:15px;color:#16292f;font-weight:500;line-height:1.4\"><span style=\"color:#d5121f;font-weight:900;flex:none\">✓<\u002Fspan>{{ w }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- PRIJATELJI -->\n      <section style=\"background:#f1f6f8\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px\">\n          <div style=\"text-align:center;margin-bottom:40px\">\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:12px\">Sarađujemo sa<\u002Fdiv>\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(26px,3.4vw,38px);letter-spacing:-.02em;margin:0\">Prijatelji auto škole<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:22px\">\n            <div title=\"Nezavisno udruženje bajkera Kruševac\" style=\"width:150px;height:150px;background:#fff;border:1px solid #e6ebf3;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:20px\" style-hover=\"border:1px solid #007bb0;box-shadow:0 14px 34px rgba(10,28,64,.1)\"><img src=\"https://autoskoladule.rs/wp-content/uploads/2020/12/udrzenje-bajkera-krusevac-logo-150x150.png\" alt=\"Nezavisno udruženje bajkera Kruševac\" style=\"max-width:100%;max-height:100%;object-fit:contain\"><\u002Fdiv>\n            <div title=\"Motocross club Gajić\" style=\"width:150px;height:150px;background:#fff;border:1px solid #e6ebf3;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:20px\" style-hover=\"border:1px solid #007bb0;box-shadow:0 14px 34px rgba(10,28,64,.1)\"><img src=\"https://autoskoladule.rs/wp-content/uploads/2021/01/motocros-club-globare-logo-150x150.png\" alt=\"Motocross club Gajić\" style=\"max-width:100%;max-height:100%;object-fit:contain\"><\u002Fdiv>\n            <div title=\"Lion Taxi Kruševac\" style=\"width:150px;height:150px;background:#fff;border:1px solid #e6ebf3;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:20px\" style-hover=\"border:1px solid #007bb0;box-shadow:0 14px 34px rgba(10,28,64,.1)\"><img src=\"https://autoskoladule.rs/wp-content/uploads/2021/01/lion-taxi-logo-1-150x150.png\" alt=\"Lion Taxi Kruševac\" style=\"max-width:100%;max-height:100%;object-fit:contain\"><\u002Fdiv>\n            <div title=\"Moto centar Gajić\" style=\"width:150px;height:150px;background:#fff;border:1px solid #e6ebf3;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:20px\" style-hover=\"border:1px solid #007bb0;box-shadow:0 14px 34px rgba(10,28,64,.1)\"><img src=\"https://autoskoladule.rs/wp-content/uploads/2021/01/moto-centar-gajic-150x150.png\" alt=\"Moto centar Gajić\" style=\"max-width:100%;max-height:100%;object-fit:contain\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- LOKACIJE CTA -->\n      <section style=\"background:#16292f;color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px;text-align:center\">\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(26px,3.4vw,40px);letter-spacing:-.02em;margin:0 0 14px\">Želiš da kreneš?<\u002Fh2>\n          <p style=\"font-size:17px;color:#aeb9cf;max-width:520px;margin:0 auto 30px;line-height:1.6\">Javi nam se ili se upiši online, odgovaramo brzo i rado.<\u002Fp>\n          <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n            <button sc-camel-on-click=\"{{ goUpis }}\" style=\"background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;padding:15px 30px;border-radius:9px;border:none;cursor:pointer\">{{ ctaLabel }} →<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ goKontakt }}\" style=\"background:transparent;color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;padding:15px 28px;border-radius:9px;border:1.5px solid rgba(255,255,255,.3);cursor:pointer\">Kontakt &amp; lokacije<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== KATEGORIJE ====================== -->\n    <sc-if value=\"{{ isKategorije }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">8 kategorija obuke<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Kategorije<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:600px;margin:0;line-height:1.6\">Izaberi kategoriju koja ti treba. Teorijsku nastavu možeš pratiti i online, a praktičnu obuku prilagođavamo tvom rasporedu.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px;display:flex;flex-direction:column;gap:56px\">\n        <sc-for list=\"{{ cats }}\" as=\"grp\" hint-placeholder-count=\"3\">\n          <div>\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,3vw,32px);letter-spacing:-.02em;margin:0 0 24px;padding-bottom:14px;border-bottom:2px solid #e6ebf3\">{{ grp.g }}<\u002Fh2>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px\">\n              <sc-for list=\"{{ grp.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n                <div style=\"border:1px solid #e6ebf3;border-radius:16px;padding:28px;background:#fff;display:flex;gap:20px;align-items:flex-start\">\n                  <div style=\"width:60px;height:60px;flex:none;border-radius:13px;background:#12262d;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;color:#d5121f\">{{ it.n }}<\u002Fdiv>\n                  <div>\n                    <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;margin:0 0 8px\">{{ it.n }} kategorija<\u002Fh3>\n                    <p style=\"font-size:14.5px;color:#5a6a85;line-height:1.6;margin:0\">{{ it.d }}<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"background:#f3f6fb;border-radius:16px;padding:36px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap\">\n          <div style=\"min-width:260px\"><h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;margin:0 0 8px\">Nisi siguran koja kategorija ti treba?<\u002Fh3><p style=\"font-size:15px;color:#5a6a85;margin:0\">Pozovi nas ili se upiši, savetujemo te oko izbora.<\u002Fp><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ goUpis }}\" style=\"background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;padding:15px 30px;border-radius:9px;border:none;cursor:pointer;white-space:nowrap\">{{ ctaLabel }} →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== CENOVNIK ====================== -->\n    <sc-if value=\"{{ isCenovnik }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">Transparentno<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Cenovnik<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:600px;margin:0;line-height:1.6\">Jasne cene po kategorijama. Za tačan iznos i mogućnost plaćanja na rate, kontaktiraj nas.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1000px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px\">\n        <div style=\"border:1px solid #e6ebf3;border-radius:16px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:90px 1fr 200px;background:#16292f;color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase\">\n            <div style=\"padding:16px 20px\">Kat.<\u002Fdiv>\n            <div style=\"padding:16px 20px\">Šta obuhvata<\u002Fdiv>\n            <div style=\"padding:16px 20px;text-align:right\">Cena obuke<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ pricing }}\" as=\"row\" hint-placeholder-count=\"8\">\n            <div style=\"display:grid;grid-template-columns:90px 1fr 200px;align-items:center;border-top:1px solid #eef1f7\">\n              <div style=\"padding:18px 20px;font-family:'Archivo',sans-serif;font-weight:900;font-size:22px;color:#007bb0\">{{ row.cat }}<\u002Fdiv>\n              <div style=\"padding:18px 20px;font-size:14.5px;color:#5a6a85;line-height:1.5\">{{ row.desc }}<\u002Fdiv>\n              <div style=\"padding:18px 20px;text-align:right;font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;color:#16292f\">{{ row.price }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"font-size:13px;color:#9aa7bd;margin:16px 4px 0;font-family:'Libre Franklin',sans-serif\">* Iznosi su placeholderi, zameni ih stvarnim cenama u editoru. Cene mogu zavisiti od broja časova i načina plaćanja.<\u002Fp>\n        <div style=\"margin-top:40px;background:linear-gradient(120deg,#0a4f74,#12262d);border-radius:18px;padding:clamp(30px,4vw,48px);color:#fff;text-align:center\">\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,3vw,34px);margin:0 0 12px;letter-spacing:-.02em\">Plaćanje na rate, bez brige<\u002Fh2>\n          <p style=\"font-size:16px;color:#cdd8ec;max-width:520px;margin:0 auto 26px;line-height:1.6\">Dogovorimo dinamiku plaćanja koja ti odgovara. Javi se za detalje.<\u002Fp>\n          <button sc-camel-on-click=\"{{ goUpis }}\" style=\"background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;padding:15px 30px;border-radius:9px;border:none;cursor:pointer\">{{ ctaLabel }} →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== VOZILA ====================== -->\n    <sc-if value=\"{{ isVozila }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">12 vozila u voznom parku<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Vozni park<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:600px;margin:0;line-height:1.6\">Moderna i redovno održavana vozila za sve kategorije. Kod nas biraš vozilo na kojem ćeš voziti.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px;display:flex;flex-direction:column;gap:48px\">\n        <sc-for list=\"{{ vozila }}\" as=\"grp\" hint-placeholder-count=\"3\">\n          <div>\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(22px,2.6vw,28px);margin:0 0 22px;letter-spacing:-.02em\">{{ grp.g }}<\u002Fh2>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px\">\n              <sc-for list=\"{{ grp.slots }}\" as=\"sl\" hint-placeholder-count=\"3\">\n                <div style=\"border:1px solid #e6ebf3;border-radius:14px;overflow:hidden;background:#fff\">\n                  <div style=\"height:170px\"><image-slot id=\"{{ sl.id }}\" shape=\"rect\" src=\"{{ sl.src }}\" placeholder=\"{{ sl.ph }}\" style=\"width:100%;height:100%\"><\u002Fimage-slot><\u002Fdiv>\n                  <div style=\"padding:16px 18px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;color:#16292f\">{{ sl.name }}<\u002Fdiv><div style=\"font-size:13px;color:#9aa7bd;margin-top:3px\">{{ sl.tag }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== NAŠ TIM ====================== -->\n    <sc-if value=\"{{ isTim }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">Instruktori · predavači · ispitivači<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Naš tim<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:600px;margin:0;line-height:1.6\">Iskusni instruktori i predavači koji se posvećuju svakom kandidatu, strpljivo, jasno i profesionalno.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px\">\n          <sc-for list=\"{{ tim }}\" as=\"m\" hint-placeholder-count=\"6\">\n            <div style=\"border:1px solid #e6ebf3;border-radius:16px;overflow:hidden;background:#fff;text-align:center\">\n              <div style=\"height:340px;background:#eef2f6;overflow:hidden\"><img src=\"{{ m.src }}\" alt=\"{{ m.name }}\" style=\"width:100%;height:100%;object-fit:cover;object-position:center 22%;display:block\"><\u002Fdiv>\n              <div style=\"padding:22px\">\n                <a href=\"{{ m.href }}\" target=\"_blank\" style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;color:#16292f;text-decoration:none\">{{ m.name }}<\u002Fa>\n                <div style=\"font-size:14px;color:#007bb0;font-weight:600;margin-top:5px\">{{ m.role }}<\u002Fdiv>\n                <div style=\"display:flex;justify-content:center;gap:8px;margin-top:14px\">\n                  <sc-for list=\"{{ m.socials }}\" as=\"soc\" hint-placeholder-count=\"0\">\n                    <a href=\"{{ soc.u }}\" target=\"_blank\" style=\"width:34px;height:34px;border-radius:8px;background:#f1f6f8;display:flex;align-items:center;justify-content:center;color:#16292f;font-size:12px;font-weight:700;text-decoration:none\">{{ soc.l }}<\u002Fa>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== GALERIJA ====================== -->\n    <sc-if value=\"{{ isGalerija }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">Iz naše škole<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Galerija<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:600px;margin:0;line-height:1.6\">Trenuci sa obuke, vozila, tim i naši kandidati.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1000px;margin:0 auto;padding:clamp(40px,5vw,72px) 24px\">\n        <div style=\"position:relative;border-radius:18px;overflow:hidden;background:#0d1c22;box-shadow:0 24px 60px rgba(10,28,64,.16);aspect-ratio:3/2\">\n          <sc-for list=\"{{ galSlides }}\" as=\"g\" hint-placeholder-count=\"1\">\n            <img src=\"{{ g.src }}\" alt=\"Galerija\" style=\"{{ g.style }}\">\n          <\u002Fsc-for>\n          <button sc-camel-on-click=\"{{ galPrev }}\" aria-label=\"Prethodna\" style=\"position:absolute;top:50%;left:16px;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:#12262d;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.25)\">‹<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ galNext }}\" aria-label=\"Sledeća\" style=\"position:absolute;top:50%;right:16px;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:#12262d;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.25)\">›<\u002Fbutton>\n          <div style=\"position:absolute;top:16px;right:20px;background:rgba(13,28,34,.72);color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;padding:6px 12px;border-radius:100px;letter-spacing:.04em\">{{ galCounter }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px\">\n          <sc-for list=\"{{ galThumbs }}\" as=\"t\" hint-placeholder-count=\"11\">\n            <div sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.style }}\"><img src=\"{{ t.src }}\" alt=\"\" style=\"width:100%;height:100%;object-fit:cover;display:block\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== O NAMA ====================== -->\n    <sc-if value=\"{{ isOnama }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">O nama<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Auto škola Dule<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:640px;margin:0;line-height:1.6\">Godinama unazad obučavamo bezbedne i sigurne vozače na dve lokacije, u Kruševcu i Varvarinu.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1000px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px\">\n        <div style=\"border-radius:18px;overflow:hidden;height:clamp(280px,34vw,420px);margin-bottom:44px;box-shadow:0 24px 60px rgba(10,28,64,.14)\">\n          <image-slot id=\"onama-img\" shape=\"rect\" src=\"https://autoskoladule.rs/wp-content/uploads/2023/10/IMG_9591-01-1024x683.jpeg\" placeholder=\"Foto, škola / tim / vozila\" style=\"width:100%;height:100%\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start\">\n          <div style=\"min-width:260px\">\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.02em;margin:0 0 16px\">Ko smo mi<\u002Fh2>\n            <p style=\"font-size:16px;color:#5a6a85;line-height:1.75;margin:0 0 16px\">Naša škola pruža sve mogućnosti i komfor da učiš vožnju u bezbednim i kvalitetnim automobilima, uz konstantnu pažnju i savete instruktora. Kod nas biraš instruktora, vozilo i termine obuke.<\u002Fp>\n            <p style=\"font-size:16px;color:#5a6a85;line-height:1.75;margin:0\">Po uspešnosti smo u vrhu auto škola u Rasinskom okrugu. Pored položenog ispita, cilj nam je da svaki polaznik postane dobar vozač koji nikada neće ugroziti ni sebe ni druge učesnike u saobraćaju.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"min-width:260px\">\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.02em;margin:0 0 16px\">Zašto kandidati biraju nas<\u002Fh2>\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <sc-for list=\"{{ why }}\" as=\"w\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:flex-start;gap:12px;font-size:15.5px;color:#16292f;font-weight:500;line-height:1.45\"><span style=\"color:#d5121f;font-weight:900;flex:none\">✓<\u002Fspan>{{ w }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:48px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n          <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"background:#f3f6fb;border-radius:14px;padding:26px 18px;text-align:center\">\n              <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(26px,3vw,38px);color:#007bb0;line-height:1\">{{ s.n }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:#5a6a85;margin-top:8px;line-height:1.4\">{{ s.l }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== KONTAKT ====================== -->\n    <sc-if value=\"{{ isKontakt }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">2 lokacije<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Kontakt<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:600px;margin:0;line-height:1.6\">Javi nam se telefonom, mejlom ili svrati u jednu od naših poslovnica.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,80px) 24px\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:44px\">\n          <div style=\"border:1px solid #e6ebf3;border-radius:16px;overflow:hidden;background:#fff\">\n            <div style=\"padding:28px 28px 20px\">\n              <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin:0 0 14px\">Kruševac<\u002Fh3>\n              <div style=\"display:flex;flex-direction:column;gap:8px;font-size:15px;color:#41506b;line-height:1.5\">\n                <div>📍 Slobodana Jovanovića 6, Kruševac<\u002Fdiv>\n                <div>📞 <a href=\"tel:0606037037\" style=\"color:#007bb0;font-weight:600\">060 6 037 037<\u002Fa><\u002Fdiv>\n                <div>✉️ <a href=\"mailto:autoskoladule@gmail.com\" style=\"color:#007bb0;font-weight:600\">autoskoladule@gmail.com<\u002Fa><\u002Fdiv>\n                <div>🕐 pon–pet: 09–17h · subota: 09–14h<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <iframe src=\"https://maps.google.com/maps?q=Slobodana%20Jovanovi%C4%87a%206%2C%20Kru%C5%A1evac&amp;t=m&amp;z=15&amp;output=embed&amp;iwloc=near\" style=\"width:100%;height:220px;border:0;border-top:1px solid #e6ebf3\" loading=\"lazy\"><\u002Fiframe>\n          <\u002Fdiv>\n          <div style=\"border:1px solid #e6ebf3;border-radius:16px;overflow:hidden;background:#fff\">\n            <div style=\"padding:28px 28px 20px\">\n              <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin:0 0 14px\">Varvarin<\u002Fh3>\n              <div style=\"display:flex;flex-direction:column;gap:8px;font-size:15px;color:#41506b;line-height:1.5\">\n                <div>📍 Slobode 94, Varvarin<\u002Fdiv>\n                <div>📞 <a href=\"tel:0606037037\" style=\"color:#007bb0;font-weight:600\">060 6 037 037<\u002Fa><\u002Fdiv>\n                <div>✉️ <a href=\"mailto:autoskoladule@gmail.com\" style=\"color:#007bb0;font-weight:600\">autoskoladule@gmail.com<\u002Fa><\u002Fdiv>\n                <div>🕐 pon–pet: 08–15h · subota: ne radimo<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <iframe src=\"https://maps.google.com/maps?q=Slobode%2094%2C%20Varvarin&amp;t=m&amp;z=15&amp;output=embed&amp;iwloc=near\" style=\"width:100%;height:220px;border:0;border-top:1px solid #e6ebf3\" loading=\"lazy\"><\u002Fiframe>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f3f6fb;border-radius:18px;padding:clamp(28px,4vw,48px)\">\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.02em;margin:0 0 6px;text-align:center\">Pošalji nam poruku<\u002Fh2>\n          <p style=\"font-size:15px;color:#5a6a85;text-align:center;margin:0 auto 28px;max-width:440px\">Odgovaramo u najkraćem mogućem roku.<\u002Fp>\n          <sc-if value=\"{{ kontaktOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <form sc-camel-on-submit=\"{{ submitKontakt }}\" style=\"max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:14px\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n              <input type=\"text\" required=\"\" placeholder=\"Ime i prezime\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff\">\n              <input type=\"tel\" required=\"\" placeholder=\"Telefon\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff\">\n            <\u002Fdiv>\n            <input type=\"email\" placeholder=\"Email (opciono)\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff\">\n            <textarea required=\"\" rows=\"4\" placeholder=\"Tvoja poruka\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff;resize:vertical\"><\u002Ftextarea>\n            <button type=\"submit\" style=\"background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;padding:15px;border-radius:9px;border:none;cursor:pointer\">Pošalji poruku →<\u002Fbutton>\n          <\u002Fform>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ kontaktSent }}\">\n          <div style=\"max-width:520px;margin:0 auto;text-align:center;background:#fff;border:1px solid #cfe6d4;border-radius:14px;padding:40px 30px\">\n            <div style=\"font-size:44px;margin-bottom:10px\">✅<\u002Fdiv>\n            <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;margin:0 0 8px\">Poruka je poslata!<\u002Fh3>\n            <p style=\"font-size:15px;color:#5a6a85;margin:0\">Hvala ti, javićemo se uskoro na tvoj kontakt.<\u002Fp>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== ONLINE UPIS ====================== -->\n    <sc-if value=\"{{ isUpis }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">Brzo i lako<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Online upis<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:600px;margin:0;line-height:1.6\">Popuni podatke i mi te kontaktiramo u najkraćem roku sa svim detaljima obuke.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:720px;margin:0 auto;padding:clamp(48px,6vw,72px) 24px\">\n        <sc-if value=\"{{ upisOpen }}\" hint-placeholder-val=\"{{ true }}\">\n        <form sc-camel-on-submit=\"{{ submitUpis }}\" style=\"display:flex;flex-direction:column;gap:16px;background:#fff;border:1px solid #e6ebf3;border-radius:18px;padding:clamp(26px,4vw,42px);box-shadow:0 18px 50px rgba(10,28,64,.08)\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><label style=\"font-size:13px;font-weight:600;color:#41506b\">Ime i prezime *<\u002Flabel><input type=\"text\" required=\"\" placeholder=\"npr. Marko Marković\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><label style=\"font-size:13px;font-weight:600;color:#41506b\">Telefon *<\u002Flabel><input type=\"tel\" required=\"\" placeholder=\"06x xxx xxxx\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px\"><label style=\"font-size:13px;font-weight:600;color:#41506b\">Email<\u002Flabel><input type=\"email\" placeholder=\"tvoj@email.com\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif\"><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><label style=\"font-size:13px;font-weight:600;color:#41506b\">Kategorija *<\u002Flabel>\n              <sc-raw-select required=\"\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff;color:#16292f\">\n                <option value=\"\">Izaberi kategoriju<\u002Foption><option>A<\u002Foption><option>A1<\u002Foption><option>A2<\u002Foption><option>AM<\u002Foption><option>B<\u002Foption><option>BE<\u002Foption><option>C<\u002Foption><option>CE<\u002Foption>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\"><label style=\"font-size:13px;font-weight:600;color:#41506b\">Lokacija *<\u002Flabel>\n              <sc-raw-select required=\"\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff;color:#16292f\">\n                <option value=\"\">Izaberi lokaciju<\u002Foption><option>Kruševac<\u002Foption><option>Varvarin<\u002Foption>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px\"><label style=\"font-size:13px;font-weight:600;color:#41506b\">Poruka (opciono)<\u002Flabel><textarea rows=\"3\" placeholder=\"Pitanja, željeni termini…\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;resize:vertical\"><\u002Ftextarea><\u002Fdiv>\n          <button type=\"submit\" style=\"background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:17px;padding:16px;border-radius:9px;border:none;cursor:pointer;margin-top:4px\">Pošalji prijavu →<\u002Fbutton>\n          <p style=\"font-size:12.5px;color:#9aa7bd;text-align:center;margin:0\">Slanjem prijave prihvataš da te kontaktiramo radi upisa.<\u002Fp>\n        <\u002Fform>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ upisSent }}\">\n        <div style=\"text-align:center;background:#fff;border:1px solid #cfe6d4;border-radius:18px;padding:56px 34px;box-shadow:0 18px 50px rgba(10,28,64,.08)\">\n          <div style=\"font-size:52px;margin-bottom:14px\">🎉<\u002Fdiv>\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;margin:0 0 10px\">Prijava je poslata!<\u002Fh2>\n          <p style=\"font-size:16px;color:#5a6a85;margin:0 0 26px;line-height:1.6\">Hvala ti na poverenju. Naš tim će te uskoro kontaktirati sa svim detaljima o obuci.<\u002Fp>\n          <button sc-camel-on-click=\"{{ goHome }}\" style=\"background:#16292f;color:#fff;font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;padding:14px 28px;border-radius:9px;border:none;cursor:pointer\">Nazad na početnu<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== VIDEO LEKCIJE ====================== -->\n    <sc-if value=\"{{ isVideo }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">Online učionica · 24/7<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Video lekcije<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:640px;margin:0;line-height:1.6\">Prva smo auto škola u okrugu sa online učionicom, sva teorijska predavanja gledaš od kuće, koliko god puta ti treba, svojim tempom.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"max-width:1000px;margin:0 auto;padding:clamp(48px,6vw,72px) 24px\">\n        <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:44px;align-items:start\">\n          <div style=\"min-width:280px\">\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.02em;margin:0 0 16px\">Šta je online učionica?<\u002Fh2>\n            <p style=\"font-size:16px;color:#5a6a70;line-height:1.75;margin:0 0 16px\">Internet platforma na kojoj možeš slušati sva predavanja vezana za polaganje testova za vozače. Časovi teorijske obuke su i dalje obavezni, online učionica je tu da ti olakša učenje.<\u002Fp>\n            <p style=\"font-size:16px;color:#5a6a70;line-height:1.75;margin:0 0 16px\">Ako na času nisi uspeo da zapamtiš gradivo ili ti treba da ga čuješ više puta, ovde to možeš neograničeno. Bez stresa, učiš brzinom koja tebi odgovara, sa bilo koje lokacije.<\u002Fp>\n            <p style=\"font-size:16px;color:#5a6a70;line-height:1.75;margin:0\">Svako predavanje (video nastavnu jedinicu) pregledaš kad god možeš i uvek se možeš vratiti na ono što ti nije bilo najjasnije.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;min-width:240px\">\n            <div style=\"background:#f1f6f8;border-radius:14px;padding:22px 24px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;color:#007bb0\">24/7<\u002Fdiv><div style=\"font-size:14px;color:#5a6a70;margin-top:4px;line-height:1.4\">Dostupno svakog trenutka, e-učionica nema radno vreme<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f1f6f8;border-radius:14px;padding:22px 24px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;color:#007bb0\">∞<\u002Fdiv><div style=\"font-size:14px;color:#5a6a70;margin-top:4px;line-height:1.4\">Neograničeno ponavljanje gradiva, tvojim tempom<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f1f6f8;border-radius:14px;padding:22px 24px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;color:#007bb0\">10<\u002Fdiv><div style=\"font-size:14px;color:#5a6a70;margin-top:4px;line-height:1.4\">Video nastavnih jedinica koje pokrivaju ceo program<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,3vw,32px);letter-spacing:-.02em;margin:52px 0 22px;padding-bottom:14px;border-bottom:2px solid #e2ebee\">Predavanja, video nastavne jedinice<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px\">\n          <sc-for list=\"{{ lessons }}\" as=\"l\" hint-placeholder-count=\"10\">\n            <div style=\"display:flex;align-items:center;gap:16px;border:1px solid #e6ebf3;border-radius:12px;padding:16px 18px;background:#fff\">\n              <div style=\"width:42px;height:42px;flex:none;border-radius:9px;background:#12262d;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:900;font-size:16px;color:#d5121f\">▶<\u002Fdiv>\n              <div style=\"font-size:15.5px;font-weight:600;color:#16292f;line-height:1.35\">{{ l }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:52px;background:#f1f6f8;border-radius:18px;padding:clamp(28px,4vw,44px)\">\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.02em;margin:0 0 6px;text-align:center\">Zatraži pristup online predavanjima<\u002Fh2>\n          <p style=\"font-size:15px;color:#5a6a70;text-align:center;margin:0 auto 26px;max-width:460px\">Popuni formu i odobrićemo ti pristup e-učionici.<\u002Fp>\n          <sc-if value=\"{{ videoOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <form sc-camel-on-submit=\"{{ submitVideo }}\" style=\"max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:14px\">\n            <input type=\"text\" required=\"\" placeholder=\"Ime i prezime *\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff\">\n            <input type=\"email\" required=\"\" placeholder=\"Email adresa *\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff\">\n            <input type=\"text\" required=\"\" placeholder=\"ID broj *\" style=\"padding:14px 16px;border:1px solid #dce3ee;border-radius:9px;font-size:15px;font-family:'Libre Franklin',sans-serif;background:#fff\">\n            <button type=\"submit\" style=\"background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;padding:15px;border-radius:9px;border:none;cursor:pointer\">Zatraži pristup →<\u002Fbutton>\n          <\u002Fform>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ videoSent }}\">\n          <div style=\"max-width:520px;margin:0 auto;text-align:center;background:#fff;border:1px solid #cfe6d4;border-radius:14px;padding:40px 30px\">\n            <div style=\"font-size:44px;margin-bottom:10px\">✅<\u002Fdiv>\n            <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;margin:0 0 8px\">Zahtev je poslat!<\u002Fh3>\n            <p style=\"font-size:15px;color:#5a6a70;margin:0\">Proverićemo tvoje podatke i poslati pristup online predavanjima na tvoj email.<\u002Fp>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ====================== KONDICIONI / DODATNI ČASOVI ====================== -->\n    <sc-if value=\"{{ isKondicioni }}\">\n    <div>\n      <section style=\"background:linear-gradient(160deg,#12262d,#0a4f74);color:#fff\">\n        <div style=\"max-width:1200px;margin:0 auto;padding:clamp(48px,6vw,84px) 24px\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.2em;color:#d5121f;text-transform:uppercase;margin-bottom:14px\">Kondicioni časovi<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(34px,5vw,60px);letter-spacing:-.025em;margin:0 0 16px;line-height:1.02\">Dodatni časovi vožnje<\u002Fh1>\n          <p style=\"font-size:18px;color:#cdd8ec;max-width:640px;margin:0;line-height:1.6\">Imaš vozačku dozvolu, a ne voziš? Vrati se u formu aktivnih vozača, sigurno, bez stresa i svojim tempom.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"max-width:1000px;margin:0 auto;padding:clamp(48px,6vw,72px) 24px\">\n        <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:44px;align-items:center;margin-bottom:52px\">\n          <div style=\"min-width:280px\">\n            <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(22px,3vw,30px);letter-spacing:-.02em;margin:0 0 18px;line-height:1.15\">Nauči da voziš bezbedno na svom vozilu<\u002Fh2>\n            <p style=\"font-size:16px;color:#5a6a70;line-height:1.75;margin:0 0 16px\">Mnogo je vozača koji poseduju dozvolu, a nisu aktivni, često zbog straha od saobraćaja i nedostatka samopouzdanja. Imaš auto i dozvolu, a i dalje čekaš da te neko poveze ili trošiš novac na taksi?<\u002Fp>\n            <p style=\"font-size:16px;color:#5a6a70;line-height:1.75;margin:0\">Dodatni časovi su namenjeni vozačima koji dugo nisu vozili. Služe da se oslobodiš straha, podigneš samopouzdanje, naučiš da upravljaš vozilom u realnim uslovima uz poštovanje svih pravila, i da savladaš parkiranje, sve što ti treba da budeš bezbedan vozač.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border-radius:16px;overflow:hidden;height:clamp(240px,28vw,320px);box-shadow:0 20px 50px rgba(10,28,64,.14);min-width:240px\">\n            <image-slot id=\"kond-page\" shape=\"rect\" src=\"https://autoskoladule.rs/wp-content/uploads/2023/01/Slika-za-kondicione-casove-1024x683.jpg\" placeholder=\"Foto, kondicioni časovi\" style=\"width:100%;height:100%\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#f1f6f8;border-radius:18px;padding:clamp(28px,4vw,44px);margin-bottom:44px\">\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.01em;margin:0 0 20px\">Ne smeš da voziš? Mi rešavamo tvoj problem.<\u002Fh3>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px 28px\">\n            <div style=\"display:flex;align-items:flex-start;gap:12px;font-size:15.5px;color:#16292f;font-weight:500;line-height:1.45\"><span style=\"color:#d5121f;font-weight:900;flex:none\">✓<\u002Fspan>Oslobađanje od straha i treme za volanom<\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:12px;font-size:15.5px;color:#16292f;font-weight:500;line-height:1.45\"><span style=\"color:#d5121f;font-weight:900;flex:none\">✓<\u002Fspan>Podizanje samopouzdanja u realnim uslovima<\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:12px;font-size:15.5px;color:#16292f;font-weight:500;line-height:1.45\"><span style=\"color:#d5121f;font-weight:900;flex:none\">✓<\u002Fspan>Vežbanje parkiranja i upravljanja vozilom<\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:12px;font-size:15.5px;color:#16292f;font-weight:500;line-height:1.45\"><span style=\"color:#d5121f;font-weight:900;flex:none\">✓<\u002Fspan>Termini u dogovoru, kad tebi odgovara<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:44px\">\n          <div style=\"border:1px solid #e6ebf3;border-radius:16px;padding:28px\">\n            <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;margin:0 0 10px\">Koliko časova mi treba?<\u002Fh3>\n            <p style=\"font-size:15px;color:#5a6a70;line-height:1.65;margin:0\">Zavisi od mnogo faktora i individualno je od osobe do osobe. Naši instruktori procenjuju tokom vožnje kada si spreman za bezbedno učešće u saobraćaju.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border:1px solid #e6ebf3;border-radius:16px;padding:28px\">\n            <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;margin:0 0 10px\">Šta je potrebno za početak?<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:8px;font-size:15px;color:#16292f;font-weight:500\">\n              <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:24px;height:24px;flex:none;border-radius:50%;background:#12262d;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800\">1<\u002Fspan>Lična karta<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:24px;height:24px;flex:none;border-radius:50%;background:#12262d;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800\">2<\u002Fspan>Vozačka dozvola<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:linear-gradient(120deg,#0a4f74,#12262d);border-radius:18px;padding:clamp(30px,4vw,48px);color:#fff;text-align:center\">\n          <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(22px,3vw,32px);margin:0 0 12px;letter-spacing:-.02em\">Zakaži prvi čas vožnje<\u002Fh2>\n          <p style=\"font-size:16px;color:#cdd8ec;max-width:520px;margin:0 auto 24px;line-height:1.6\">Vožnja nije teška ni strašna, potrebno je samo strpljenje i par časova. Pozovi nas:<\u002Fp>\n          <a href=\"tel:0606037037\" style=\"display:inline-flex;align-items:center;gap:10px;background:#d5121f;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(18px,2.4vw,24px);padding:16px 34px;border-radius:10px;text-decoration:none\">📞 060 6 037 037<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- ====================== FOOTER ====================== -->\n  <footer style=\"background:#0d1c22;color:#cbd4e3\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:clamp(44px,6vw,72px) 24px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:44px\">\n      <div>\n        <div style=\"display:inline-flex;align-items:center;background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:20px\"><img src=\"5020c2e9-f48e-4dcf-a852-0aad01982d8b\" alt=\"Auto škola Dule\" style=\"height:46px;width:auto;display:block\"><\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.7;color:#8b97ac;max-width:340px;margin:0 0 18px\">Bezbedni i sigurni vozači od A do CE kategorije. Dve lokacije, Kruševac i Varvarin.<\u002Fp>\n        <div style=\"display:flex;gap:12px\">\n          <a href=\"https://www.facebook.com/dule.autoskola/\" target=\"_blank\" style=\"width:38px;height:38px;border-radius:9px;background:#12203a;display:flex;align-items:center;justify-content:center;color:#cbd4e3;font-size:13px;font-weight:700\">Fb<\u002Fa>\n          <a href=\"https://www.instagram.com/autoskoladule/\" target=\"_blank\" style=\"width:38px;height:38px;border-radius:9px;background:#12203a;display:flex;align-items:center;justify-content:center;color:#cbd4e3;font-size:13px;font-weight:700\">Ig<\u002Fa ', src: 'https://autoskoladule.rs/wp-content/uploads/2020/12/golf-obuka-b-kategorija.jpg' },\n    { id: 'g10', h: '220px', src: 'https://autoskoladule.rs/wp-content/uploads/2020/12/01.jpg' },\n    { id: 'g11', h: '300px', src: 'https://autoskoladule.rs/wp-content/uploads/2020/12/slider-1.jpg' },\n  ];\n\n  go(k) {\n    this.setState({ page: k, navOpen: false });\n    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n  setupReveal() {\n    if (typeof window === 'undefined' || !('IntersectionObserver' in window)) return;\n    if (this._io) this._io.disconnect();\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); this._io.unobserve(e.target); } });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    const root = this._rootEl || document;\n    root.querySelectorAll('main section').forEach((el, i) => {\n      if (el.dataset.rev) return;\n      el.dataset.rev = '1';\n      el.classList.add('reveal');\n      el.style.transitionDelay = Math.min(i, 3) * 60 + 'ms';\n      this._io.observe(el);\n    });\n  }\n\n  revealHero() {\n    if (typeof document === 'undefined') return;\n    const els = document.querySelectorAll('.h-anim');\n    requestAnimationFrame(() => requestAnimationFrame(() => {\n      els.forEach((el) => el.classList.add('in'));\n    }));\n    // Fallback: guarantee visibility even if transitions are throttled (e.g. background tab)\n    setTimeout(() => els.forEach((el) => {\n      if (getComputedStyle(el).opacity !== '1') {\n        el.style.transition = 'none';\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n      }\n    }), 1600);\n  }\n\n  componentDidMount() {\n    this._rootEl = document;\n    setTimeout(() => this.setupReveal(), 30);\n    this.revealHero();\n  }\n\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState.page !== this.state.page) setTimeout(() => this.setupReveal(), 30);\n  }\n\n  componentWillUnmount() { if (this._io) this._io.disconnect(); }\n\n  renderVals() {\n    const p = this.state.page;\n    const mk = (k) => () => this.go(k);\n    const navItems = this.navList.map((it) => {\n      const active = it.key === p;\n      return {\n        ...it,\n        onClick: mk(it.key),\n        linkStyle: {\n          textDecoration: 'none', cursor: 'pointer', fontFamily: \"'Libre Franklin',sans-serif\",\n          fontSize: '15px', padding: '8px 2px', whiteSpace: 'nowrap',\n          color: active ? '#007bb0' : '#41506b', fontWeight: active ? 700 : 500,\n          borderBottom: active ? '2px solid #d5121f' : '2px solid transparent',\n        },\n      };\n    });\n    return {\n      navItems,\n      toggleNav: () => this.setState(s => ({ navOpen: !s.navOpen })),\n      navClass: 'dz-nav' + (this.state.navOpen ? '' : ' closed'),\n      hamburgerIcon: this.state.navOpen ? '✕' : '☰',\n      ctaLabel: this.props.primaryCta ?? 'Online upis',\n      promoActive: this.props.promoActive ?? true,\n      goHome: mk('home'), goKategorije: mk('kategorije'), goCenovnik: mk('cenovnik'),\n      goVozila: mk('vozila'), goTim: mk('tim'), goGalerija: mk('galerija'),\n      goOnama: mk('onama'), goKontakt: mk('kontakt'), goUpis: mk('upis'), goVideo: mk('video'), goKondicioni: mk('kondicioni'),\n      isHome: p === 'home', isKategorije: p === 'kategorije', isCenovnik: p === 'cenovnik',\n      isVozila: p === 'vozila', isTim: p === 'tim', isGalerija: p === 'galerija',\n      isOnama: p === 'onama', isKontakt: p === 'kontakt', isUpis: p === 'upis', isVideo: p === 'video', isKondicioni: p === 'kondicioni',\n      galSlides: this.galerija.map((g, i) => ({\n        src: g.src,\n        style: {\n          position: 'absolute', inset: 0, width: '100%', height: '100%',\n          objectFit: 'cover', display: 'block',\n          opacity: i === this.state.galIndex ? 1 : 0,\n          transition: 'opacity .5s ease', pointerEvents: 'none',\n        },\n      })),\n      galThumbs: this.galerija.map((g, i) => ({\n        src: g.src,\n        onClick: () => this.galGo(i),\n        style: {\n          width: '64px', height: '48px', borderRadius: '8px', overflow: 'hidden',\n          cursor: 'pointer', flex: 'none',\n          border: i === this.state.galIndex ? '2px solid #d5121f' : '2px solid transparent',\n          opacity: i === this.state.galIndex ? 1 : 0.55, transition: 'all .2s',\n        },\n      })),\n      galPrev: () => this.galGo(this.state.galIndex - 1),\n      galNext: () => this.galGo(this.state.galIndex + 1),\n      galCounter: (this.state.galIndex + 1) + ' / ' + this.galerija.length,\n      cats: this.cats, catCards: this.catCards, stats: this.stats, why: this.why,\n      tim: this.tim, vozila: this.vozila, galerija: this.galerija, pricing: this.pricing, lessons: this.lessons,\n      submitUpis: (e) => { e.preventDefault(); this.setState({ upisSent: true }); },\n      submitKontakt: (e) => { e.preventDefault(); this.setState({ kontaktSent: true }); },\n      submitVideo: (e) => { e.preventDefault(); this.setState({ videoSent: true }); },\n      upisSent: this.state.upisSent, upisOpen: !this.state.upisSent,\n      kontaktSent: this.state.kontaktSent, kontaktOpen: !this.state.kontaktSent,\n      videoSent: this.state.videoSent, videoOpen: !this.state.videoSent,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
